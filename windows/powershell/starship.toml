"$schema" = 'https://starship.rs/config-schema.json'

# Gruvbox-riced Starship prompt.
# Two lines: a powerline status bar (dir / git / langs) + a gold ◇ prompt char
# that matches the Emacs agent-shell symbol. Right side shows duration + clock.

format = """
[](bg1)\
$os\
$directory\
[](fg:bg1 bg:bg2)\
$git_branch\
$git_status\
[](fg:bg2 bg:bg3)\
$nodejs$python$rust$golang$java$lua$c$dotnet$php$ruby\
[](fg:bg3)\
$fill\
$cmd_duration\
$time\
$line_break\
$character"""

add_newline = true
palette = 'gruvbox'

[palettes.gruvbox]
bg0    = '#1d2021'
bg1    = '#3c3836'
bg2    = '#504945'
bg3    = '#665c54'
fg     = '#ebdbb2'
gold   = '#fabd2f'
orange = '#fe8019'
aqua   = '#8ec07c'
green  = '#b8bb26'
blue   = '#83a598'
purple = '#d3869b'
red    = '#fb4934'
gray   = '#928374'

[os]
disabled = false
style = "bg:bg1 fg:gold"
format = '[ $symbol ]($style)'

[os.symbols]
Windows = ""
Linux = ""
Macos = ""

[directory]
style = "bg:bg1 fg:gold bold"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
home_symbol = " ~"
read_only = " "
read_only_style = "bg:bg1 fg:red"

[directory.substitutions]
"Documents" = " "
"Downloads" = " "
"dotfiles"  = " "
"~/dev"     = " dev"

[git_branch]
symbol = ""
style = "bg:bg2 fg:aqua bold"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:bg2 fg:orange"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "≡"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[nodejs]
symbol = ""
style = "bg:bg3 fg:green"
format = '[ $symbol $version ]($style)'

[python]
symbol = ""
style = "bg:bg3 fg:blue"
format = '[ $symbol $version ]($style)'

[rust]
symbol = ""
style = "bg:bg3 fg:orange"
format = '[ $symbol $version ]($style)'

[golang]
symbol = ""
style = "bg:bg3 fg:aqua"
format = '[ $symbol $version ]($style)'

[java]
symbol = ""
style = "bg:bg3 fg:red"
format = '[ $symbol $version ]($style)'

[lua]
symbol = ""
style = "bg:bg3 fg:blue"
format = '[ $symbol $version ]($style)'

[c]
symbol = ""
style = "bg:bg3 fg:blue"
format = '[ $symbol $version ]($style)'

[dotnet]
symbol = ".NET"
style = "bg:bg3 fg:purple"
format = '[ $symbol $version ]($style)'

[php]
symbol = ""
style = "bg:bg3 fg:purple"
format = '[ $symbol $version ]($style)'

[ruby]
symbol = ""
style = "bg:bg3 fg:red"
format = '[ $symbol $version ]($style)'

[fill]
symbol = " "

[cmd_duration]
min_time = 500
style = "fg:gray"
format = '[ took $duration ]($style)'

[time]
disabled = false
time_format = "%H:%M"
style = "fg:gray"
format = '[ $time ]($style)'

[character]
success_symbol = "[◇](bold gold)"
error_symbol = "[◇](bold red)"
vimcmd_symbol = "[◆](bold green)"
