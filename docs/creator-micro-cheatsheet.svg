<svg viewBox="0 0 680 500" width="680" height="500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cmTitle">
<title id="cmTitle">Creator Micro layer 2 — monitor keys</title>
<rect x="0" y="0" width="680" height="500" fill="#faf9f5"/>
<rect x="115" y="20" width="450" height="418" rx="26" fill="none" stroke="#888780" stroke-width="2.5"/>
<circle cx="184" cy="86" r="26" fill="#F1EFE8" stroke="#5F5E5A"/>
<circle cx="496" cy="86" r="26" fill="#F1EFE8" stroke="#5F5E5A"/>
<g>
<rect x="243" y="45" width="90" height="82" rx="10" fill="#FAECE7" stroke="#993C1D"/>
<text x="288" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#712B13">3+4 → win</text>
<text x="288" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">F17</text>
</g>
<g>
<rect x="347" y="45" width="90" height="82" rx="10" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="392" y="80" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#085041">all → mac</text>
<text x="392" y="100" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">F18</text>
</g>
<g>
<rect x="139" y="141" width="90" height="82" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text x="184" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">flip 3</text>
<text x="184" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">F19</text>
</g>
<g>
<rect x="243" y="141" width="90" height="82" rx="10" fill="#EEEDFE" stroke="#534AB7"/>
<text x="288" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#3C3489">flip 4</text>
<text x="288" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">shift+F19</text>
</g>
<g>
<rect x="347" y="141" width="90" height="82" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
<text x="392" y="176" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#633806">4 → work</text>
<text x="392" y="196" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#854F0B">shift+F17</text>
</g>
<g fill="#F1EFE8" fill-opacity="0.5" stroke="#B4B2A9">
<rect x="451" y="141" width="90" height="82" rx="10"/>
<rect x="139" y="237" width="90" height="82" rx="10"/>
<rect x="243" y="237" width="90" height="82" rx="10"/>
<rect x="347" y="237" width="90" height="82" rx="10"/>
<rect x="451" y="237" width="90" height="82" rx="10"/>
<rect x="139" y="333" width="90" height="82" rx="10"/>
<rect x="243" y="333" width="90" height="82" rx="10"/>
<rect x="347" y="333" width="90" height="82" rx="10"/>
</g>
<g>
<rect x="451" y="333" width="90" height="82" rx="10" fill="#F1EFE8" stroke="#5F5E5A"/>
<text x="496" y="368" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#444441">layer 3</text>
<text x="496" y="388" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">TO(3)</text>
</g>
<text x="340" y="472" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">1 = laptop · 2 = portrait · 3 = center · 4 = right — 1 and 2 always stay on the mac</text>
</svg>
